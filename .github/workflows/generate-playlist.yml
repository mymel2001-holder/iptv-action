# .github/workflows/generate-playlist.yml
name: Generate IPTV Playlist

permissions:
  contents: write
  
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 1. Generate list.m3u
      # ------------------------------------------------------------------
      - name: Generate list.m3u
        run: |
          echo "#EXTM3U" > list.m3u
          echo "" >> list.m3u

          fetch_m3u() {
            curl -fsSL "$1" | sed 's/#extm3u//gi' | sed 's/extm3u//gi'
          }
          
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_xumo.m3u"   >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_pluto.m3u"  >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_tubi.m3u"   >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_stirr.m3u"  >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_firetv.m3u" >> list.m3u
          echo "" >> list.m3u
          fetch_m3u https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/us_local.m3u >> list.m3u
          echo "" >> list.m3u
          fetch_m3u https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/us_roku.m3u >> list.m3u
          echo "" >> list.m3u
          echo '#EXTINF:-1 tvg-id="CNBC@YT",CNBC YouTube' >> list.m3u
          echo "https://www.youtube.com/c/CNBC/live" >> list.m3u
          echo "" >> list.m3u

      # ------------------------------------------------------------------
      # 2. Setup Node.js v22 (no cache)
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ------------------------------------------------------------------
      # 3. Commit & push (EPG has been removed due to being borked)
      # ------------------------------------------------------------------
      - name: Commit and push changes
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add list.m3u

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update list.m3u [skip ci]"
            git push
          fi
