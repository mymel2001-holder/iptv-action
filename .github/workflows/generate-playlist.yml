# .github/workflows/generate-playlist.yml
name: Generate IPTV Playlist (with dead-link filtering)

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6 AM UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate clean list.m3u
        run: |
          # Final playlist
          OUTPUT="list.m3u"
          echo "#EXTM3U" > "$OUTPUT"
          echo "" >> "$OUTPUT"

          # Temporary file for one source
          TEMP_SOURCE=$(mktemp)
          TEMP_CLEAN=$(mktemp)

          # List of source playlists (add/remove as you wish)
          SOURCES=(
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_xumo.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_pluto.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_tubi.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_stirr.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_firetv.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_local.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_roku.m3u"
            "https://database.freetuxtv.net/WebStreamExport/index?format=m3u&status=2&country=us&isp=all"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_abcnews.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_cbsn.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_pbs.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_samsung.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_vizio.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_tcl.m3u"
            "https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_usa.m3u8"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/uk.m3u"
            "https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_uk.m3u8"
            "https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_australia.m3u8"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/au.m3u"
            "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/au_samsung.m3u"
          )

          check_stream() {
            local url="$1"
            # Timeout: connect 8s, total 20s max
            # Follow redirects, fail on HTTP errors, silent, show only headers
            local code=$(curl -m 20 --connect-timeout 8 -f -s -o /dev/null -w "%{http_code}" --head "$url" 2>/dev/null || echo "000")
            
            if [[ "$code" == "200" ]]; then
              # Extra sanity: check that content-type looks like video/audio (optional but recommended)
              local ctype=$(curl -m 20 --connect-timeout 8 -f -s -I "$url" 2>/dev/null | grep -i '^content-type:' | awk '{print tolower($2)}' | tr -d '\r' || echo "")
              if [[ "$ctype" == *video* || "$ctype" == *audio* || "$ctype" == *octet-stream* || "$ctype" == *mpegurl* || "$ctype" == "" ]]; then
                return 0   # alive
              fi
            fi
            return 1     # dead or suspicious
          }

          for src in "${SOURCES[@]}"; do
            echo "Processing source: $src"
            if ! curl -fsSL "$src" > "$TEMP_SOURCE"; then
              echo "   Failed to download $src, skipping"
              continue
            fi

            > "$TEMP_CLEAN"   # empty cleaned version for this source

            while IFS= read -r line; do
              # If line is an #EXTINF line, save it and remember it
              if [[ "$line" == "#EXTINF:"* ]]; then
                CURRENT_EXTINF="$line"
                continue
              fi

              # If line looks like an http/https URL → it's a stream URL
              if [[ "$line" == http*://* || "$line" == https*://* ]]; then
                URL="$line"

                if check_stream "$URL"; then
                  # Stream is alive → keep both EXTINF and URL
                  [[ -n "$CURRENT_EXTINF" ]] && echo "$CURRENT_EXTINF" >> "$TEMP_CLEAN"
                  echo "$URL" >> "$TEMP_CLEAN"
                  echo "   Added   $URL"
                else
                  echo "   Removed $URL (dead/offline)"
                fi
                # Reset for next entry
                CURRENT_EXTINF=""
              else
                # Any other line (comments, empty, etc.) → copy as-is
                echo "$line" >> "$TEMP_CLEAN"
              fi
            done < "$TEMP_SOURCE"

            # Append cleaned source to final playlist (with a blank line separator)
            cat "$TEMP_CLEAN" >> "$OUTPUT"
            echo "" >> "$OUTPUT"
            echo "Finished $src"
            echo "-----------------------------------"
          done

          rm -f "$TEMP_SOURCE" "$TEMP_CLEAN"
          echo "Final playlist generated: $(wc -l < "$OUTPUT") lines"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add list.m3u

          if git diff --staged --quiet; then
            echo "No changes detected in list.m3u"
          else
            git commit -m "Auto-update list.m3u – dead streams removed $(date -u +%Y-%m-%d)"
            git push
            echo "Changes pushed"
          fi
