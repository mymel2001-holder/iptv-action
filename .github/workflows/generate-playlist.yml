# .github/workflows/generate-playlist.yml
name: Generate IPTV Playlist + EPG

permissions:
  contents: write
  
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 1. Generate list.m3u
      # ------------------------------------------------------------------
      - name: Generate list.m3u
        run: |
          echo "#EXTM3U" > list.m3u
          echo "" >> list.m3u

          fetch_m3u() {
            curl -fsSL "$1" | sed -E '/^#EXTM3U|^#EXTINF/d; /^$/d'
          }

          fetch_m3u "https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_usa.m3u8" >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_xumo.m3u"   >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_pluto.m3u"  >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_local.m3u"  >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_tubi.m3u"   >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_stirr.m3u"  >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_firetv.m3u" >> list.m3u
          echo "" >> list.m3u

      # ------------------------------------------------------------------
      # 2. Setup Node.js v22 (no cache)
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ------------------------------------------------------------------
      # 3. Clone iptv-org/epg + generate channels + grab EPG
      # ------------------------------------------------------------------
      - name: Generate EPG with iptv-org/epg
        run: |

          # Download US channels file
          curl -fsSL "https://www.open-epg.com/files/unitedstates11.xml.txt" > epg_full.xml

          # Extract tvg-ids from list.m3u
          grep -o 'tvg-id="[^"]*"' list.m3u | sed 's/tvg-id="//; s/"$//' | sort -u > /tmp/tvg_ids.txt

          # Filter EPG: keep only programmes for matching tvg-id
          awk '
            BEGIN {
              while (getline id < "/tmp/tvg_ids.txt") keep[id] = 1;
            }
            /<\?xml|<!DOCTYPE|<tv|<\/tv>/ { print; next }
            /<channel / { in_channel = 1; print; next }
            in_channel && /<\/channel>/ { in_channel = 0; print; next }
            in_channel { print; next }
            /<programme / {
              if ($0 ~ /channel="[^"]*"/) {
                match($0, /channel="([^"]*)"/, arr);
                ch = arr[1];
                if (ch in keep) {
                  print;
                  in_prog = 1;
                } else {
                  in_prog = 0;
                }
              }
              next;
            }
            in_prog { print }
            /<\/programme>/ && in_prog { in_prog = 0; print; next }
          ' epg_full.xml > epg.xml

          # Cleanup
          rm -rf temp_epg epg_full.xml channels_us.xml /tmp/tvg_ids.txt

      # ------------------------------------------------------------------
      # 4. Commit & push
      # ------------------------------------------------------------------
      - name: Commit and push changes
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add list.m3u epg.xml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update list.m3u and epg.xml [skip ci]"
            git push
          fi
          fi
