name: Generate IPTV Playlist + EPG

on:
  schedule:
    - cron: '0 6 * * *'      # Daily at 6 AM UTC
  workflow_dispatch:         # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 1. Generate list.m3u (merged US sources)
      # ------------------------------------------------------------------
      - name: Generate list.m3u
        run: |
          echo "#EXTM3U" > list.m3u
          echo "" >> list.m3u

          fetch_m3u() {
            curl -fsSL "$1" | sed -E '/^#EXTM3U|^#EXTINF/d; /^$/d'
          }

          fetch_m3u "https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_usa.m3u8" >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_xumo.m3u"   >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_pluto.m3u"  >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_local.m3u"  >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_tubi.m3u"   >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_stirr.m3u"  >> list.m3u
          echo "" >> list.m3u
          fetch_m3u "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/us_firetv.m3u" >> list.m3u
          echo "" >> list.m3u

      # ------------------------------------------------------------------
      # 2. Setup Node.js (v22, NO CACHE)
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Per README: v23+ unsupported

      # ------------------------------------------------------------------
      # 3. Clone, install, & generate EPG (per README)
      # ------------------------------------------------------------------
      - name: Generate EPG with iptv-org/epg
        run: |
          # Clone repo
          git clone --depth 1 https://github.com/iptv-org/epg.git temp_epg

          # Copy US channels mapping (for scraping US sites)
          cp temp_epg/mappings/us.xml channels_us.xml

          # Install & run INSIDE cloned dir (uses its package-lock.json)
          cd temp_epg
          npm ci
          npm run grab -- \
            --channels=../channels_us.xml \
            --output=../epg_full.xml \
            --max-connections=5 \
            --delay=1000
          cd ..

          # ------------------------------------------------------------------
          # Filter to channels in list.m3u (tvg-id match)
          # ------------------------------------------------------------------
          # Extract unique tvg-ids
          grep -o 'tvg-id="[^"]*"' list.m3u | sed 's/tvg-id="//; s/"$//' | sort -u > /tmp/tvg_ids.txt

          # Improved awk filter: Keep matching <programme> + all <channel> (harmless)
          awk '
            BEGIN {
              while (getline id < "/tmp/tvg_ids.txt") keep[id] = 1;
              keep_all_channels = 1;  # Keep channels even if not in M3U
            }
            # Preserve XML structure
            /^\s*<\?xml/ || /^\s*<!DOCTYPE/ || /^<tv/ || /^<\/tv>/ { print; next }
            
            # Keep all <channel> blocks
            /<channel / { in_channel = 1; print; next }
            in_channel && /<\/channel>/ { in_channel = 0; print; next }
            in_channel { print; next }
            
            # Filter <programme>: only if channel matches tvg-id
            /<programme channel=/ {
              match($0, /channel="([^"]+)"/, arr);
              prog_ch = arr[1];
              if (prog_ch in keep) {
                in_prog = 1;
                print;
              } else {
                in_prog = 0;
              }
              next;
            }
            in_prog { print; next }
            /<\/programme>/ && in_prog { in_prog = 0; print; next }
          ' epg_full.xml > epg.xml

          # Cleanup
          rm -rf temp_epg epg_full.xml channels_us.xml /tmp/tvg_ids.txt

      # ------------------------------------------------------------------
      # 4. Commit & push if changed
      # ------------------------------------------------------------------
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add list.m3u epg.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update list.m3u and epg.xml [skip ci]"
            git push
          fi
